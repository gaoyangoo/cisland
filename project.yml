name: cisland
options:
  bundleIdPrefix: com.claus
targets:
  cisland:
    type: application
    platform: macOS
    sources:
      - App
      - Core
      - Models
      - Modules
      - Services
      - Views
      - Windows
      - path: hooks
        type: file
        buildPhase: resources
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleName: "Claus Island"
        CFBundleIdentifier: "com.claus.island"
        CFBundleVersion: "1.0"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        NSHighResolutionCapable: true
        LSBackgroundOnly: true
    settings:
      CODE_SIGN_IDENTITY: "-"
      COPY_PHASE_STRIP: "NO"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      ENABLE_HARDENED_RUNTIME: false
      TARGETED_DEVICE_FAMILY: "1"
      MACOSX_DEPLOYMENT_TARGET: "14.0"