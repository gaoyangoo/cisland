name: cisland
options:
  bundleIdPrefix: com.claus
packages:
  cisland:
    url: .
    majorVersion: 1
    minorVersion: "0"
targets:
  cisland:
    type: application
    platform: macOS
    sources:
      - App
      - Core
      - Models
      - Modules
      - Services
      - Views
      - Windows
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleName: "Claus Island"
        CFBundleIdentifier: "com.claus.island"
        CFBundleVersion: "1.0"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        NSHighResolutionCapable: true
        LSBackgroundOnly: true
    settings:
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      ENABLE_HARDENED_RUNTIME: false
      TARGETED_DEVICE_FAMILY: "1"